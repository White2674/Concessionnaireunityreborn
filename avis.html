<!DOCTYPE html>
<html lang="FR">
<head>
    <meta charset="UTF-8">
    <meta name="VIEWPORT" content="width=device-width, initial-scale=1.0">
    <title>AVIS CLIENTS | L'AUTO ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d0d0d; color: #ffffff; overflow-x: hidden; }
        
        /* HEADER NOIR FIXE (STYLE IMAGE 0CC942) */
        .nav-permanent { background: #0d0d0d; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* DESIGN DU HERO AVEC GRADIENT */
        .header-gradient {
            background: linear-gradient(180deg, rgba(13,13,13,0) 0%, #0d0d0d 100%), 
                        url('https://i.goopics.net/a36q50.png');
            background-size: cover; background-position: center;
        }

        /* CARTES ET PANNEAUX */
        .stats-panel { background: #151515; border: 1px solid #222; }
        .review-card { background: #1a1a1a; border: 1px solid #252525; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        .review-card:hover { border-color: #ff4d4d; transform: translateY(-8px); box-shadow: 0 20px 40px rgba(255, 77, 77, 0.05); }
        
        .force-caps { text-transform: uppercase; }
        .input-dark { background: #111; border: 1px solid #222; color: white; outline: none; transition: 0.3s; }
        .input-dark:focus { border-color: #ff4d4d; background: #151515; box-shadow: 0 0 0 4px rgba(255, 77, 77, 0.1); }
        
        /* SYSTÈME D'ÉTOILES */
        .star-rating { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 10px; }
        .star-rating input { display: none; }
        .star-rating label { font-size: 2.8rem; color: #222; cursor: pointer; transition: 0.2s; }
        .star-rating label:hover, .star-rating label:hover ~ label,
        .star-rating input:checked ~ label { color: #ff4d4d; text-shadow: 0 0 15px rgba(255, 77, 77, 0.4); }

        #modalAvis { backdrop-filter: blur(15px); display: none; z-index: 1000; }
        
        /* ADMIN MODE */
        .admin-delete { 
            display: none; position: absolute; top: -10px; right: -10px; 
            background: #ff4d4d; color: white; border-radius: 50%; 
            width: 28px; height: 28px; font-size: 16px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 77, 77, 0.4); border: none; cursor: pointer;
        }
        body.admin-mode .admin-delete { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <!-- NAVIGATION (MISE À JOUR SELON IMAGE 0CC942) -->
    <header class="fixed top-0 left-0 w-full z-50 nav-permanent">
        <nav class="max-w-[1800px] mx-auto flex justify-between items-center py-5 px-6 md:px-12">
            <!-- LOGO : CLIQUE ICI POUR LE MODE ADMIN (CODE: 1234) -->
            <div onclick="toggleAdmin()" class="flex items-center cursor-pointer select-none">
                <img src="TON_LIEN_DE_LOGO_ICI.png" alt="Logo L'Auto Elite" class="h-10 md:h-12 w-auto object-contain">
            </div>
            
            <nav class="hidden md:flex items-center gap-10 text-[12px] font-black uppercase tracking-[0.2em] text-gray-400">
                <ul class="flex items-center gap-10">
                    <li><a href="index.html" class="hover:text-white transition">Accueil</a></li>
                    <li><a href="catalogue.html" class="hover:text-white transition">Catalogue</a></li>
                    <li><a href="avis.html" class="text-white border-b-2 border-[#ff4d4d] pb-1">Avis Clients</a></li>
                    <li><a href="equipe.html" class="hover:text-white transition">L'Équipe</a></li>
                    <li><a href="contact.html" class="hover:text-white transition">Contact</a></li>
                </ul>
                <!-- BOUTON CANDIDATURE -->
                <a href="candidature.html" class="bg-[#ff4d4d] text-white py-3.5 px-7 rounded-xl hover:bg-[#e63e3e] transition-all flex items-center gap-2 shadow-lg shadow-red-900/20">
                    <span class="text-lg">📝</span> CANDIDATURE
                </a>
            </nav>

            <button class="md:hidden text-[#ff4d4d]">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </nav>
    </header>

    <!-- HERO SECTION -->
    <header class="header-gradient pt-48 pb-24 px-6 text-center">
        <h1 class="text-[#ff4d4d] text-6xl md:text-8xl font-black uppercase tracking-tighter mb-4">L'AVIS DE <span class="text-white">NOS CLIENTS</span></h1>
        <p class="text-gray-500 text-[10px] font-black uppercase tracking-[0.4em]">SATISFACTION CLIENT : NOTRE PRIORITÉ ABSOLUE</p>
    </header>

    <!-- DASHBOARD STATISTIQUES -->
    <section class="max-w-[1400px] mx-auto px-6 -mt-12 relative z-10">
        <div class="stats-panel rounded-[2.5rem] p-10 shadow-2xl">
            <div class="flex flex-col md:flex-row items-center justify-between gap-8 mb-8 border-b border-white/5 pb-8">
                <div class="flex items-center gap-6">
                    <span id="moyenneNombre" class="text-7xl font-black text-white leading-none tracking-tighter">0.0</span>
                    <div>
                        <div id="moyenneEtoiles" class="text-[#ff4d4d] text-2xl flex"></div>
                        <span id="totalAvisLabel" class="text-[9px] text-gray-600 font-black uppercase tracking-widest">BASÉ SUR 0 AVIS RÉELS</span>
                    </div>
                </div>
                <button onclick="toggleModal()" class="bg-white text-black px-10 py-5 rounded-2xl text-[11px] font-black uppercase hover:bg-[#ff4d4d] hover:text-white transition duration-300 shadow-xl">
                    DÉPOSER UN AVIS
                </button>
            </div>

            <!-- BARRE DE RECHERCHE -->
            <div class="relative">
                <input id="searchInput" type="text" placeholder="RECHERCHER UN NOM OU UN VENDEUR..." 
                       class="w-full input-dark rounded-2xl p-5 text-xs font-bold force-caps tracking-widest pl-14">
                <div class="absolute left-5 top-5 opacity-20">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
            </div>
        </div>
    </section>

    <!-- LISTE DES AVIS (ÉLARGIE) -->
    <main class="max-w-[1800px] mx-auto px-6 py-20">
        <div id="avisList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Injecté par JavaScript -->
        </div>
        <div id="noResults" class="hidden text-center py-20 opacity-20 font-black text-2xl uppercase tracking-tighter">AUCUN RÉSULTAT</div>
    </main>

    <!-- MODAL D'AJOUT -->
    <div id="modalAvis" class="fixed inset-0 flex items-center justify-center p-6 bg-black/80">
        <div class="bg-[#0f0f0f] w-full max-w-xl rounded-[3rem] p-12 border border-white/10 shadow-2xl">
            <h2 class="text-3xl font-black uppercase mb-8 tracking-tighter italic">VOTRE <span class="text-[#ff4d4d]">AVIS</span></h2>
            
            <form id="formAvis" class="space-y-6">
                <input type="text" id="formNom" placeholder="VOTRE NOM ET PRÉNOM" required class="w-full input-dark rounded-2xl p-5 text-xs font-bold force-caps">

                <input type="text" id="vendeurComplet" placeholder="NOM DU VENDEUR (EX: LEWIS THOMPSON)" required class="w-full input-dark rounded-2xl p-5 text-xs font-bold force-caps">

                <div>
                    <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-4">NOTE SUR 5</label>
                    <div class="star-rating">
                        <input type="radio" id="star5" name="note" value="5" required /><label for="star5">★</label>
                        <input type="radio" id="star4" name="note" value="4" /><label for="star4">★</label>
                        <input type="radio" id="star3" name="note" value="3" /><label for="star3">★</label>
                        <input type="radio" id="star2" name="note" value="2" /><label for="star2">★</label>
                        <input type="radio" id="star1" name="note" value="1" /><label for="star1">★</label>
                    </div>
                </div>

                <textarea id="formMessage" placeholder="VOTRE EXPÉRIENCE..." rows="4" required class="w-full input-dark rounded-2xl p-5 text-xs font-bold force-caps"></textarea>

                <div class="flex flex-col gap-3 pt-4">
                    <button type="submit" class="w-full bg-[#ff4d4d] text-white py-5 rounded-2xl text-[11px] font-black uppercase shadow-lg shadow-red-900/40 hover:scale-[1.02] transition">PUBLIER L'AVIS</button>
                    <button type="button" onclick="toggleModal()" class="w-full text-gray-600 text-[10px] font-black uppercase tracking-widest">ANNULER</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- LOGIQUE DE DONNÉES ---
        let avisData = JSON.parse(localStorage.getItem('elite_avis_final_v5')) || [
            { id: 1, nom: "JULIEN B.", date: "02 MAI 2026", message: "SERVICE IRRÉPROCHABLE ET VÉHICULE DANS UN ÉTAT CONCOURS. MERCI À TOUTE L'ÉQUIPE.", note: 5, vendeur: "LEWIS THOMPSON" }
        ];

        // --- GESTION DES MAJUSCULES ---
        document.addEventListener('input', (e) => {
            if (e.target.classList.contains('force-caps')) {
                e.target.value = e.target.value.toUpperCase();
            }
        });

        function save() {
            localStorage.setItem('elite_avis_final_v5', JSON.stringify(avisData));
            renderAvis(avisData);
        }

        function getStars(n) {
            return '<span class="text-[#ff4d4d]">' + '★'.repeat(n) + '</span><span class="text-[#222]">' + '★'.repeat(5-n) + '</span>';
        }

        // --- ADMINISTRATION ---
        function toggleAdmin() {
            const pass = prompt("ACCÈS ADMIN (CODE) :");
            if(pass === "1234") { 
                document.body.classList.toggle('admin-mode');
                const isEnabled = document.body.classList.contains('admin-mode');
                alert(isEnabled ? "MODE GESTION ACTIVÉ." : "MODE GESTION DÉSACTIVÉ.");
            }
        }

        function deleteAvis(id) {
            if(confirm("SUPPRIMER CET AVIS DÉFINITIVEMENT ?")) { 
                avisData = avisData.filter(a => a.id !== id); 
                save(); 
            }
        }

        function renderAvis(dataToDisplay) {
            const container = document.getElementById('avisList');
            const noResults = document.getElementById('noResults');
            
            const total = avisData.length;
            const moyenne = total > 0 ? (avisData.reduce((acc, a) => acc + a.note, 0) / total).toFixed(1) : "0.0";
            
            document.getElementById('moyenneNombre').innerText = moyenne;
            document.getElementById('moyenneEtoiles').innerHTML = getStars(Math.round(moyenne));
            document.getElementById('totalAvisLabel').innerText = `BASÉ SUR ${total} AVIS RÉELS`;

            if (dataToDisplay.length === 0) {
                container.innerHTML = "";
                noResults.classList.remove('hidden');
                return;
            }
            noResults.classList.add('hidden');

            container.innerHTML = dataToDisplay.map(a => `
                <article class="review-card rounded-[2.5rem] p-10 flex flex-col">
                    <button class="admin-delete" onclick="deleteAvis(${a.id})">×</button>
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-white font-extrabold text-lg block tracking-tight uppercase">${a.nom}</span>
                            <span class="text-[#ff4d4d] font-black text-[9px] uppercase tracking-tighter">${a.date}</span>
                        </div>
                        <div class="text-xl">${getStars(a.note)}</div>
                    </div>
                    <p class="text-gray-400 text-sm leading-relaxed mb-8 flex-grow uppercase font-medium italic">"${a.message}"</p>
                    <div class="text-[9px] font-black text-gray-600 uppercase tracking-widest border-t border-white/5 pt-6">
                        CONSEILLER : <span class="text-white font-bold">${a.vendeur}</span>
                    </div>
                </article>
            `).join('');
        }

        function toggleModal() {
            const m = document.getElementById('modalAvis');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }

        document.getElementById('formAvis').addEventListener('submit', (e) => {
            e.preventDefault();
            const noteChecked = document.querySelector('input[name="note"]:checked');
            if(!noteChecked) return;
            
            const n = {
                id: Date.now(),
                nom: document.getElementById('formNom').value.toUpperCase(),
                vendeur: document.getElementById('vendeurComplet').value.toUpperCase(),
                note: parseInt(noteChecked.value),
                message: document.getElementById('formMessage').value.toUpperCase(),
                date: new Date().toLocaleDateString('fr-FR', {day:'2-digit', month:'long', year:'numeric'}).toUpperCase()
            };
            
            avisData.unshift(n);
            save();
            toggleModal();
            e.target.reset();
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q = e.target.value.toUpperCase();
            const filtered = avisData.filter(a => 
                a.nom.includes(q) || a.message.includes(q) || a.vendeur.includes(q)
            );
            renderAvis(filtered);
        });

        renderAvis(avisData);
    </script>
</body>
</html>
