<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avis Clients | L'Auto Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0d0d0d; 
            color: #ffffff;
        }
        /* Style inspiré de l'image_79c83c.jpg */
        .header-gradient {
            background: linear-gradient(180deg, rgba(20,20,20,0) 0%, #0d0d0d 100%), 
                        url('https://i.imgur.com/votre-image-garage.jpg');
            background-size: cover;
            background-position: center;
        }
        .stats-panel { background: #151515; border: 1px solid #222; }
        .review-card { 
            background: #1a1a1a; 
            border: 1px solid #252525; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .review-card:hover { 
            border-color: #ff4d4d; 
            transform: translateY(-5px);
            background: #1f1f1f;
        }
        .star-active { color: #ff4d4d; }
        .star-inactive { color: #333; }
        .input-dark { 
            background: #151515; 
            border: 1px solid #252525; 
            color: white;
            transition: border-color 0.3s;
        }
        .input-dark:focus { border-color: #ff4d4d; outline: none; }
        .text-coral { color: #ff4d4d; }
        .bg-coral { background-color: #ff4d4d; }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="flex justify-between items-center px-12 py-6 bg-black/80 backdrop-blur-lg fixed w-full z-50 border-b border-white/5">
        <div class="text-xl font-extrabold uppercase tracking-tighter">L'Auto <span class="text-coral">Elite</span></div>
        <div class="hidden md:flex space-x-10 text-[11px] font-bold uppercase tracking-[0.2em] text-gray-400">
            <a href="index.html" class="hover:text-white transition">Accueil</a>
            <a href="catalogue.html" class="hover:text-white transition">Occasions</a>
            <a href="avis.html" class="text-white border-b-2 border-coral pb-1">Avis</a>
            <a href="equipe.html" class="hover:text-white transition">Équipe</a>
        </div>
        <button class="bg-coral hover:bg-red-700 text-white px-8 py-2.5 rounded-full text-[10px] font-black uppercase transition shadow-lg shadow-red-900/20">Connexion</button>
    </nav>

    <!-- Hero Section Avis -->
    <header class="header-gradient pt-48 pb-24 px-6 text-center">
        <h1 class="text-coral text-5xl md:text-7xl font-black uppercase tracking-tighter mb-4">Paroles de <span class="text-white">Clients</span></h1>
        <p class="max-w-xl mx-auto text-gray-400 text-sm font-medium leading-relaxed">
            La satisfaction de nos clients est le moteur de notre excellence. 
            Découvrez les témoignages de ceux qui nous font confiance.
        </p>
    </header>

    <!-- Dashboard Statistiques -->
    <section class="max-w-5xl mx-auto px-6 -mt-12 relative z-10">
        <div class="stats-panel rounded-[2rem] p-10 shadow-2xl flex flex-col md:flex-row items-center justify-between gap-8">
            <div class="text-center md:text-left">
                <span class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2">Note de satisfaction</span>
                <div id="globalRatingDisplay" class="flex items-center gap-4">
                    <span class="text-6xl font-black text-white leading-none">4.9</span>
                    <div>
                        <div class="flex text-coral text-xl">★★★★★</div>
                        <span class="text-[10px] text-gray-500 font-bold">BASÉ SUR 128 AVIS</span>
                    </div>
                </div>
            </div>
            
            <div class="flex-1 w-full max-w-md">
                <input id="searchInput" type="text" placeholder="Rechercher par nom, message ou collaborateur..." 
                       class="w-full input-dark rounded-2xl py-4 px-6 text-sm font-medium">
            </div>

            <button class="bg-white/5 hover:bg-white/10 text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase transition border border-white/10">
                Laisser un avis
            </button>
        </div>
    </section>

    <!-- Grille des Avis -->
    <main class="max-w-7xl mx-auto px-6 py-24">
        <div id="avisList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Injecté par JavaScript -->
        </div>
    </main>

    <footer class="py-12 border-t border-white/5 text-center">
        <p class="text-[10px] font-bold text-gray-600 uppercase tracking-[0.5em]">&copy; 2026 L'Auto Elite | Excellence Automobile</p>
    </footer>

    <script>
        const avisData = [
            { nom: "Zayn Allen", date: "27 AVRIL 2026", message: "Une expérience d'achat inégalée. L'équipe est d'un professionnalisme rare et les véhicules sont impeccables.", note: 5, collaborateur: "Lewis Thompson" },
            { nom: "Sophia Martin", date: "28 AVRIL 2026", message: "J'ai trouvé la voiture de mes rêves en moins de 48h. Service de livraison à domicile parfait.", note: 5, collaborateur: "Teeway Beckers" },
            { nom: "Marc Vasseur", date: "29 AVRIL 2026", message: "Le suivi après-vente est exceptionnel. On sent qu'on n'est pas juste un numéro.", note: 4, collaborateur: "Jimmy Wanks" },
            { nom: "Léa Roussel", date: "01 MAI 2026", message: "Transparence totale sur l'historique du véhicule. Je recommande les yeux fermés.", note: 5, collaborateur: "Lewis Thompson" }
        ];

        function getStars(n) {
            return '<span class="star-active">' + '★'.repeat(n) + '</span>' + 
                   '<span class="star-inactive">' + '★'.repeat(5-n) + '</span>';
        }

        function renderAvis(items) {
            const container = document.getElementById('avisList');
            container.innerHTML = items.map(a => `
                <article class="review-card rounded-[2.5rem] p-8 flex flex-col h-full">
                    <div class="flex justify-between items-start mb-6">
                        <div class="flex flex-col">
                            <span class="text-white font-extrabold text-lg tracking-tight">${a.nom}</span>
                            <span class="text-coral font-black text-[9px] uppercase mt-1">${a.date}</span>
                        </div>
                        <div class="text-lg">${getStars(a.note)}</div>
                    </div>
                    
                    <p class="text-gray-400 text-sm leading-relaxed mb-8 flex-grow font-medium">"${a.message}"</p>
                    
                    <div class="pt-6 border-t border-white/5 flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-coral/10 flex items-center justify-center">
                            <svg class="w-4 h-4 text-coral" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/></svg>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[9px] font-black text-gray-500 uppercase tracking-widest">Collaborateur dédié</span>
                            <span class="text-white text-xs font-bold">${a.collaborateur}</span>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = avisData.filter(a => 
                a.nom.toLowerCase().includes(q) || 
                a.message.toLowerCase().includes(q) ||
                a.collaborateur.toLowerCase().includes(q)
            );
            renderAvis(filtered);
        });

        renderAvis(avisData);
    </script>
</body>
</html>
