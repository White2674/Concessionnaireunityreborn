<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>L'AUTO ELITE | RENDEZ-VOUS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d0d0d; color: #ffffff; overflow-x: hidden; }
    
    .nav-permanent { background: #0d0d0d; border-bottom: 1px solid rgba(255,255,255,0.05); }

    .header-gradient {
        background: linear-gradient(180deg, rgba(13,13,13,0) 0%, #0d0d0d 100%), 
                    url('https://i.goopics.net/a36q50.png');
        background-size: cover; background-position: center;
    }

    .form-card { 
        background: #151515; 
        border: 1px solid #222; 
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .input-elite { 
        background: #0a0a0a; 
        border: 1px solid #222; 
        color: white; 
        outline: none; 
        transition: all 0.3s ease; 
    }
    .input-elite:focus { 
        border-color: #ff4d4d; 
        box-shadow: 0 0 0 4px rgba(255, 77, 77, 0.1); 
    }

    /* Style spécifique pour les inputs date/time (icônes blanches) */
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {
        filter: invert(1);
        cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- NAVIGATION -->
  <header id="header" class="fixed top-0 left-0 w-full z-50 nav-permanent">
    <nav class="max-w-7xl mx-auto flex justify-between items-center py-5 px-6 md:px-12">
      <a href="index.html" class="flex items-center gap-3">
        <div class="text-xl font-extrabold uppercase tracking-tighter">
          L'AUTO <span class="text-[#ff4d4d]">ELITE</span>
        </div>
      </a>

      <nav class="hidden md:flex items-center gap-8 text-[11px] font-black uppercase tracking-[0.2em] text-gray-400">
        <ul class="flex items-center gap-8">
          <li><a href="index.html" class="hover:text-white transition">Accueil</a></li>
          <li><a href="catalogue.html" class="hover:text-white transition">Catalogue</a></li>
          <li><a href="avis.html" class="hover:text-white transition">Avis Clients</a></li>
          <li><a href="equipe.html" class="hover:text-white transition">L'Équipe</a></li>
          <li><a href="contact.html" class="hover:text-white transition">Contact</a></li>
        </ul>
        <a href="candidature.html" class="bg-[#ff4d4d] text-white py-3 px-6 rounded-xl hover:scale-105 transition shadow-lg shadow-red-900/20">
          📝 Candidature
        </a>
      </nav>
    </nav>
  </header>

  <!-- HERO SECTION -->
  <section class="header-gradient pt-56 pb-20 px-6 text-center">
      <h1 class="text-[#ff4d4d] text-6xl md:text-8xl font-black uppercase tracking-tighter mb-4 italic">PRENDRE <span class="text-white">RDV</span></h1>
      <p class="text-gray-400 text-sm font-black uppercase tracking-[0.5em] opacity-80">AVEC LA DIRECTION DU CONCESSIONNAIRE AUTOMOBILE</p>
  </section>

  <!-- FORMULAIRE -->
  <main class="max-w-4xl mx-auto px-6 pb-24">
      <div class="form-card rounded-[3rem] p-8 md:p-16 border border-white/5 relative overflow-hidden">
          
          <form class="space-y-8 relative z-10" id="appointmentForm">
              
              <!-- NOM + TEL -->
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div class="space-y-2">
                      <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-4">Nom complet</label>
                      <input type="text" name="Nom" placeholder="EX: TEEWAY BECKERS" required 
                             class="w-full input-elite rounded-2xl p-5 text-sm font-bold uppercase tracking-widest">
                  </div>
                  <div class="space-y-2">
                      <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-4">Téléphone</label>
                      <input type="text" name="Numéro de Téléphone" placeholder="555-0000" required 
                             class="w-full input-elite rounded-2xl p-5 text-sm font-bold uppercase tracking-widest">
                  </div>
              </div>

              <!-- DATE + HEURE -->
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div class="space-y-2">
                      <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-4">Date souhaitée</label>
                      <input type="date" name="DateRendezVous" required 
                             class="w-full input-elite rounded-2xl p-5 text-sm font-bold uppercase tracking-widest">
                  </div>
                  <div class="space-y-2">
                      <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-4">Heure souhaitée</label>
                      <input type="time" name="HeureRendezVous" required 
                             class="w-full input-elite rounded-2xl p-5 text-sm font-bold uppercase tracking-widest">
                  </div>
              </div>

              <!-- MESSAGE -->
              <div class="space-y-2">
                  <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-4">Détails de la demande</label>
                  <textarea name="Commentaire" rows="5" placeholder="OBJET DU RENDEZ-VOUS..." 
                            class="w-full input-elite rounded-3xl p-6 text-sm font-bold uppercase tracking-widest resize-none"></textarea>
              </div>

              <!-- BOUTON -->
              <div class="pt-4">
                  <button type="submit" id="submitBtn"
                          class="w-full bg-[#ff4d4d] text-white py-6 rounded-2xl text-[12px] font-black uppercase shadow-2xl hover:bg-white hover:text-black transition-all duration-500 tracking-[0.4em]">
                      CONFIRMER LA DEMANDE
                  </button>
              </div>

              <!-- MESSAGE DE STATUT -->
              <p id="formMessage" class="text-center text-[10px] font-black uppercase tracking-widest hidden"></p>

          </form>
      </div>
  </main>

  <footer class="py-12 border-t border-white/5 text-center">
      <p class="text-gray-600 text-[10px] font-black uppercase tracking-[0.5em]">© 2026 L'AUTO ELITE - TOUS DROITS RÉSERVÉS</p>
  </footer>

  <script>
    const form = document.getElementById('appointmentForm');
    const messageEl = document.getElementById('formMessage');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Animation bouton pendant l'envoi
      submitBtn.disabled = true;
      submitBtn.innerText = "ENVOI EN COURS...";

      const formData = new FormData(form);
      const payload = {
        content: "<@&1498383326174515339>", // Ping du rôle
        embeds: [{
          title: "📅 __NOUVELLE DEMANDE DE RENDEZ-VOUS__",
          color: 0xff4d4d, // Rouge Elite
          thumbnail: { url: "https://i.goopics.net/srmg4w.png" },
          fields: [
            { name: "👤 __CLIENT__", value: formData.get('Nom') || "NON SPÉCIFIÉ", inline: true },
            { name: "📞 __TÉLÉPHONE__", value: formData.get('Numéro de Téléphone') || "NON SPÉCIFIÉ", inline: true },
            { name: "📅 __DATE__", value: formData.get('DateRendezVous'), inline: true },
            { name: "⏰ __HEURE__", value: formData.get('HeureRendezVous'), inline: true },
            { name: "📝 __OBJET__", value: formData.get('Commentaire') || "AUCUN DÉTAIL", inline: false }
          ],
          footer: { text: "DEMANDE DE RENDEZ-VOUS - CONCESSIONNAIRE AUTOMOBILE" },
          timestamp: new Date().toISOString()
        }]
      };

      const webhookUrl = "https://discord.com/api/webhooks/1500490212336337057/LnJWIGqGCAQ36jEMxQ_c89VWeq_KqnXhcVVMD9vQSi3X-TPX6oYzM9-MSTQj1urwK_vq";

      try {
        const response = await fetch(webhookUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (!response.ok) throw new Error();

        messageEl.textContent = "✅ DEMANDE TRANSMISE AVEC SUCCÈS !";
        messageEl.className = "text-center text-green-500 text-[10px] font-black uppercase tracking-widest mt-4";
        messageEl.classList.remove("hidden");
        form.reset();

      } catch (error) {
        messageEl.textContent = "❌ ERREUR LORS DE L'ENVOI. RÉESSAYEZ.";
        messageEl.className = "text-center text-red-500 text-[10px] font-black uppercase tracking-widest mt-4";
        messageEl.classList.remove("hidden");
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "CONFIRMER LA DEMANDE";
      }
    });
  </script>
</body>
</html>
